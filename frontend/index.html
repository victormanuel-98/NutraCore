<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="NutraCore - Dashboard de Nutrición Inteligente" />
    <link rel="icon" type="image/png" href="/images/logos/nutracoreFavicon.png" />
    <title>NutraCore</title>
    <script>
      (function () {
        try {
          var storedTheme = window.localStorage.getItem("nutracore_theme");
          var shouldUseDark =
            storedTheme === "dark" ||
            (!storedTheme && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (shouldUseDark) {
            document.documentElement.classList.add("theme-dark");
            document.documentElement.style.colorScheme = "dark";
          }
        } catch (error) {
          // Ignore storage access errors and continue with default light theme.
        }
      })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
